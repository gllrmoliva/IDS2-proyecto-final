services:
  api:
    build: ./backend
    container_name: panoptes_backend
    ports:
      - "8000:8000"
    env_file:
      - ./backend/.env
    command: ["uv", "run", "uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend/app:/backend/app
      - ./backend/db:/backend/db
  db:
    image: postgres:16-alpine
    container_name: panoptes_db
    ports:
      - "5432:5432"
    env_file:
      - ./backend/.env
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/db/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      # Verifica que la base de datos está aceptando conexiones antes de que inicialize API
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:

